services:
  - type: web
    name: avs-wb-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build -w packages/shared && npm run build -w apps/api
    startCommand: npm run start:prod -w apps/api
    envVars:
      - key: PORT
        value: 3000
      - key: APP_TIMEZONE
        value: Asia/Colombo
      - key: CORS_ORIGIN
        value: https://avs-wb-management.vercel.app
      - key: WEB_APP_URL
        value: https://avs-wb-management.vercel.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: REMINDER_FROM_EMAIL
        sync: false
      - key: REMINDER_RECIPIENTS
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: WEB_PUSH_VAPID_PUBLIC
        sync: false
      - key: WEB_PUSH_VAPID_PRIVATE
        sync: false
